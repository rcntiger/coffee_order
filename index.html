<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ 우리팀 커피 주문</title>
<style>
  :root{
    --primary:#143A6B; --accent:#FFD400; --on-primary:#fff;
    --bg:#F5F4F0; --card:#fff; --line:#E5E2DA; --text:#1E1E1E; --sub:#7A7670;
    --danger:#D6453A; --radius:14px;
  }
  body.brand-mega{ --primary:#1C1B1A; --accent:#FFE600; }
  body.brand-compose{ --primary:#5C3A21; --accent:#FFC907; }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{font-size:16px;}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg); color:var(--text);
    max-width:560px; margin:0 auto; padding-bottom:110px;
    transition:background .2s;
  }

  header{
    background:var(--primary); color:var(--on-primary);
    padding:20px 18px 16px; border-radius:0 0 22px 22px;
    transition:background .25s;
  }
  header h1{font-size:1.15rem; font-weight:800; letter-spacing:-.02em;}
  header .date{font-size:.8rem; opacity:.75; margin-top:3px;}
  .brand-tabs{display:flex; gap:8px; margin-top:14px;}
  .brand-tab{
    flex:1; padding:10px 0; border:none; border-radius:10px; cursor:pointer;
    font-size:.9rem; font-weight:700; font-family:inherit;
    background:rgba(255,255,255,.14); color:rgba(255,255,255,.85);
    transition:all .15s;
  }
  .brand-tab.active{ background:var(--accent); color:#1E1E1E; box-shadow:0 2px 8px rgba(0,0,0,.25);}

  main{padding:16px 14px;}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-bottom:14px;
  }
  .card h2{font-size:.95rem; font-weight:800; margin-bottom:12px; letter-spacing:-.01em;}
  .card h2 .count-badge{
    display:inline-block; background:var(--primary); color:#fff;
    font-size:.72rem; padding:2px 8px; border-radius:99px; margin-left:6px; vertical-align:1px;
  }

  label{display:block; font-size:.78rem; font-weight:700; color:var(--sub); margin:12px 0 5px;}
  label:first-of-type{margin-top:0;}
  input[type=text], select{
    width:100%; padding:11px 12px; font-size:.95rem; font-family:inherit;
    border:1.5px solid var(--line); border-radius:10px; background:#FAFAF8; color:var(--text);
    outline:none;
  }
  input[type=text]:focus, select:focus{border-color:var(--primary);}
  .row{display:flex; gap:8px;}
  .row > *{flex:1;}

  /* 카테고리 필터 */
  .cat-scroll{
    display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin-bottom:8px;
    scrollbar-width:none;
  }
  .cat-scroll::-webkit-scrollbar{display:none;}
  .cat-btn{
    flex:none; padding:6px 12px; border:1.5px solid var(--line); border-radius:99px;
    font-size:.8rem; font-weight:700; font-family:inherit; background:#FAFAF8; color:var(--sub);
    cursor:pointer; white-space:nowrap;
  }
  .cat-btn.active{background:var(--primary); border-color:var(--primary); color:#fff;}

  .seg{display:flex; gap:6px;}
  .seg button{
    flex:1; padding:10px 0; font-size:.9rem; font-weight:700; font-family:inherit;
    border:1.5px solid var(--line); border-radius:10px; background:#FAFAF8; color:var(--sub); cursor:pointer;
  }
  .seg button.on{ background:var(--primary); border-color:var(--primary); color:#fff;}
  .seg button.on.ice{ background:#2D7FD3; border-color:#2D7FD3;}
  .seg button.on.hot{ background:#D6453A; border-color:#D6453A;}

  .opt-row{display:flex; align-items:center; justify-content:space-between; margin-top:12px;}
  .opt-row .opt-label{font-size:.88rem; font-weight:600;}
  .opt-row .opt-price{font-size:.78rem; color:var(--sub); margin-left:6px;}
  .toggle{position:relative; width:46px; height:26px; flex:none;}
  .toggle input{opacity:0; width:0; height:0;}
  .toggle .knob{
    position:absolute; inset:0; background:#D8D5CE; border-radius:99px; cursor:pointer; transition:.15s;
  }
  .toggle .knob::after{
    content:''; position:absolute; width:20px; height:20px; border-radius:50%;
    background:#fff; top:3px; left:3px; transition:.15s; box-shadow:0 1px 3px rgba(0,0,0,.2);
  }
  .toggle input:checked + .knob{background:var(--primary);}
  .toggle input:checked + .knob::after{left:23px;}

  .custom-fields{display:none; margin-top:10px;}
  .custom-fields.show{display:block;}

  .btn-add{
    width:100%; margin-top:16px; padding:14px 0; border:none; border-radius:12px;
    background:var(--primary); color:#fff; font-size:1rem; font-weight:800; font-family:inherit;
    cursor:pointer; letter-spacing:-.01em;
  }
  .btn-add:active{transform:scale(.99);}

  /* 주문 리스트 */
  .order-item{
    display:flex; align-items:center; gap:10px;
    padding:11px 2px; border-bottom:1px dashed var(--line);
  }
  .order-item:last-child{border-bottom:none;}
  .order-item .who{
    flex:none; width:58px; font-size:.85rem; font-weight:800;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .order-item .what{flex:1; min-width:0;}
  .order-item .menu-name{font-size:.9rem; font-weight:600;}
  .order-item .menu-opt{font-size:.74rem; color:var(--sub); margin-top:1px;}
  .order-item .price{flex:none; font-size:.85rem; font-weight:700; font-variant-numeric:tabular-nums;}
  .order-item .del{
    flex:none; border:none; background:none; color:#C9C5BD; font-size:1.05rem;
    cursor:pointer; padding:4px 2px 4px 6px; line-height:1;
  }
  .order-item .del:active{color:var(--danger);}
  .temp-chip{
    display:inline-block; font-size:.68rem; font-weight:800; padding:1px 6px; border-radius:6px;
    margin-right:4px; vertical-align:1px;
  }
  .temp-chip.ICE{background:#E3F0FB; color:#2D7FD3;}
  .temp-chip.HOT{background:#FBE7E5; color:#D6453A;}
  .empty{text-align:center; color:var(--sub); font-size:.85rem; padding:22px 0;}

  .list-actions{display:flex; justify-content:flex-end; margin-top:10px;}
  .btn-reset{
    border:none; background:none; color:var(--sub); font-size:.78rem; font-family:inherit;
    cursor:pointer; text-decoration:underline; text-underline-offset:3px;
  }

  .bottom-bar{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:560px; background:var(--primary); color:#fff;
    padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    display:flex; align-items:center; gap:12px;
    border-radius:18px 18px 0 0; box-shadow:0 -4px 16px rgba(0,0,0,.12);
    transition:background .25s;
  }
  .bottom-bar .sum{flex:1;}
  .bottom-bar .sum .cups{font-size:.75rem; opacity:.8;}
  .bottom-bar .sum .total{font-size:1.2rem; font-weight:800; font-variant-numeric:tabular-nums;}
  .btn-receipt{
    flex:none; border:none; border-radius:11px; padding:12px 18px;
    background:var(--accent); color:#1E1E1E; font-size:.95rem; font-weight:800; font-family:inherit; cursor:pointer;
  }

  .modal-bg{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:50;
    align-items:flex-end; justify-content:center;
  }
  .modal-bg.show{display:flex;}
  .receipt{
    width:100%; max-width:560px; max-height:82vh; overflow-y:auto;
    background:#FFFDF6; border-radius:20px 20px 0 0; padding:22px 20px calc(22px + env(safe-area-inset-bottom));
  }
  .receipt-head{text-align:center; border-bottom:2px dashed #C9C5BD; padding-bottom:12px;}
  .receipt-head .shop{font-size:1.05rem; font-weight:800;}
  .receipt-head .meta{font-size:.75rem; color:var(--sub); margin-top:3px;}
  .receipt-body{padding:12px 0; border-bottom:2px dashed #C9C5BD;}
  .receipt-line{
    display:flex; align-items:baseline; gap:8px; padding:5px 0;
    font-size:.9rem; font-variant-numeric:tabular-nums;
  }
  .receipt-line .nm{flex:1;}
  .receipt-line .qt{flex:none; font-weight:800;}
  .receipt-line .pr{flex:none; width:74px; text-align:right; color:var(--sub); font-size:.82rem;}
  .receipt-line .ppl{font-size:.7rem; color:var(--sub); display:block; margin-top:1px;}
  .receipt-total{
    display:flex; justify-content:space-between; padding:12px 0 4px;
    font-size:1.05rem; font-weight:800; font-variant-numeric:tabular-nums;
  }
  .receipt-btns{display:flex; gap:8px; margin-top:14px;}
  .receipt-btns button{
    flex:1; padding:13px 0; border-radius:11px; font-size:.92rem; font-weight:800; font-family:inherit; cursor:pointer; border:none;
  }
  .btn-copy{background:var(--primary); color:#fff;}
  .btn-close{background:#EBE8E1; color:var(--text);}

  .toast{
    position:fixed; left:50%; bottom:120px; transform:translateX(-50%) translateY(10px);
    background:#1E1E1E; color:#fff; font-size:.85rem; font-weight:600;
    padding:10px 18px; border-radius:99px; opacity:0; pointer-events:none;
    transition:all .25s; z-index:99; white-space:nowrap;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .notice{font-size:.72rem; color:var(--sub); text-align:center; margin:4px 0 20px; line-height:1.5;}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body class="brand-paik">

<header>
  <h1>☕ 우리팀 커피 주문</h1>
  <div class="date" id="todayDate"></div>
  <div class="brand-tabs">
    <button class="brand-tab active" data-brand="paik">빽다방</button>
    <button class="brand-tab" data-brand="mega">메가커피</button>
    <button class="brand-tab" data-brand="compose">컴포즈</button>
  </div>
</header>

<main>
  <section class="card">
    <h2>주문 추가</h2>
    <label for="inpName">이름</label>
    <input type="text" id="inpName" placeholder="예: 김철수" maxlength="10" autocomplete="off">

    <label>카테고리</label>
    <div class="cat-scroll" id="catScroll"></div>

    <label for="selMenu">메뉴</label>
    <select id="selMenu"></select>

    <div class="custom-fields" id="customFields">
      <div class="row">
        <input type="text" id="inpCustomName" placeholder="메뉴 이름 직접 입력">
        <input type="text" id="inpCustomPrice" placeholder="가격 (숫자만)" inputmode="numeric">
      </div>
    </div>

    <label>온도</label>
    <div class="seg" id="tempSeg">
      <button type="button" data-temp="ICE" class="on ice">ICE</button>
      <button type="button" data-temp="HOT">HOT</button>
    </div>

    <div class="opt-row">
      <span class="opt-label">샷 추가 <span class="opt-price" id="shotPriceLabel"></span></span>
      <label class="toggle">
        <input type="checkbox" id="chkShot">
        <span class="knob"></span>
      </label>
    </div>

    <label for="inpMemo">요청사항 (선택)</label>
    <input type="text" id="inpMemo" placeholder="예: 연하게, 얼음 적게" maxlength="20" autocomplete="off">

    <button class="btn-add" id="btnAdd">주문 담기</button>
  </section>

  <section class="card">
    <h2>주문 현황 <span class="count-badge" id="countBadge">0명</span></h2>
    <div id="orderList"><div class="empty">아직 주문이 없습니다.<br>첫 주문을 담아보세요!</div></div>
    <div class="list-actions">
      <button class="btn-reset" id="btnReset">전체 초기화</button>
    </div>
  </section>

  <p class="notice">※ 메뉴 가격은 변동될 수 있으니 매장 가격과 다르면 '직접 입력'을 이용하세요.<br>주문 내역은 이 기기(브라우저)에 자동 저장됩니다.</p>
</main>

<div class="bottom-bar">
  <div class="sum">
    <div class="cups" id="barCups">0잔</div>
    <div class="total" id="barTotal">0원</div>
  </div>
  <button class="btn-receipt" id="btnOpenReceipt">📋 주문서 보기</button>
</div>

<div class="modal-bg" id="modalBg">
  <div class="receipt">
    <div class="receipt-head">
      <div class="shop" id="rcShop">빽다방 주문서</div>
      <div class="meta" id="rcMeta"></div>
    </div>
    <div class="receipt-body" id="rcBody"></div>
    <div class="receipt-total">
      <span>합계</span>
      <span id="rcTotal">0원</span>
    </div>
    <div class="receipt-btns">
      <button class="btn-copy" id="btnCopy">주문서 복사</button>
      <button class="btn-close" id="btnClose">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

      { name:'바닐라 프라페',           cat:'프라페/스무디', hot:null, ice:4500 },
      { name:'초코 프라페',             cat:'프라페/스무디', hot:null, ice:4500 },

      // 에이드/주스
      { name:'복숭아 아이스티',         cat:'에이드/주스', hot:null, ice:2500 },

      { name:'청포도에이드',            cat:'에이드/주스', hot:null, ice:3500 },
      { name:'레몬에이드',             cat:'에이드/주스', hot:null, ice:3500 },
      { name:'오렌지주스',             cat:'에이드/주스', hot:null, ice:3500 },
      // 밀크쉐이크
      { name:'플레인 밀크쉐이크',        cat:'밀크쉐이크', hot:null, ice:4700 },
      { name:'딸기 밀크쉐이크',         cat:'밀크쉐이크', hot:null, ice:5200 },

const CUSTOM = '__custom__';
const LS_KEY = 'teamCoffeeOrder_v2';

let state = { brand: 'paik', orders: [] };
let curCat = '전체';
let curTemp = 'ICE';

function load() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (s && BRANDS[s.brand] && Array.isArray(s.orders)) state = s;
    }
  } catch(e) {}
}
function save() { localStorage.setItem(LS_KEY, JSON.stringify(state)); }

const $ = id => document.getElementById(id);
const elName=$('inpName'), elMenu=$('selMenu'), elMemo=$('inpMemo'),
      elShot=$('chkShot'), elCustom=$('customFields'),
      elCustomName=$('inpCustomName'), elCustomPrice=$('inpCustomPrice');

function won(n){ return n.toLocaleString('ko-KR')+'원'; }

function applyBrandTheme(){
  document.body.className = 'brand-'+state.brand;
  document.querySelectorAll('.brand-tab').forEach(b=>
    b.classList.toggle('active', b.dataset.brand===state.brand));
  $('shotPriceLabel').textContent = '(+'+BRANDS[state.brand].shotPrice.toLocaleString()+'원)';
}

function renderCats(){
  const scroll = $('catScroll');
  scroll.innerHTML = '';
  BRANDS[state.brand].cats.forEach(c=>{
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (c===curCat?' active':'');
    btn.textContent = c;
    btn.addEventListener('click', ()=>{ curCat=c; renderCats(); renderMenuSelect(); });
    scroll.appendChild(btn);
  });
}

function renderMenuSelect(){
  const menus = BRANDS[state.brand].menus;
  elMenu.innerHTML = '';
  const filtered = curCat==='전체' ? menus : menus.filter(m=>m.cat===curCat);
  filtered.forEach((m,i)=>{
    const realIdx = menus.indexOf(m);
    const prices=[];
    if(m.hot!=null) prices.push('HOT '+m.hot.toLocaleString());
    if(m.ice!=null) prices.push('ICE '+m.ice.toLocaleString());
    const opt=document.createElement('option');
    opt.value=realIdx;
    opt.textContent=m.name+' · '+prices.join(' / ');
    elMenu.appendChild(opt);
  });
  const optC=document.createElement('option');
  optC.value=CUSTOM; optC.textContent='➕ 직접 입력 (다른 메뉴)';
  elMenu.appendChild(optC);
  onMenuChange();
}

function onMenuChange(){
  const isCustom = elMenu.value===CUSTOM;
  elCustom.classList.toggle('show', isCustom);
  if(!isCustom){
    const m = BRANDS[state.brand].menus[+elMenu.value];
    if(m){
      if(curTemp==='HOT' && m.hot==null) setTemp('ICE');
      if(curTemp==='ICE' && m.ice==null) setTemp('HOT');
    }
  }
}

function setTemp(t){
  curTemp=t;
  document.querySelectorAll('#tempSeg button').forEach(b=>{
    const on=b.dataset.temp===t;
    b.classList.toggle('on',on);
    b.classList.toggle('ice',on&&t==='ICE');
    b.classList.toggle('hot',on&&t==='HOT');
  });
}

function renderOrders(){
  const list=$('orderList');
  if(!state.orders.length){
    list.innerHTML='<div class="empty">아직 주문이 없습니다.<br>첫 주문을 담아보세요!</div>';
  } else {
    list.innerHTML='';
    state.orders.forEach(o=>{
      const div=document.createElement('div');
      div.className='order-item';
      const opts=[o.shot?'샷추가':null,o.memo||null].filter(Boolean);
      div.innerHTML=
        '<div class="who"></div>'+
        '<div class="what">'+
          '<div class="menu-name"><span class="temp-chip '+o.temp+'">'+o.temp+'</span><span class="mn"></span></div>'+
          (opts.length?'<div class="menu-opt"></div>':'')+
        '</div>'+
        '<div class="price">'+won(o.price)+'</div>'+
        '<button class="del" aria-label="삭제">✕</button>';
      div.querySelector('.who').textContent=o.name;
      div.querySelector('.mn').textContent=o.menu;
      if(opts.length) div.querySelector('.menu-opt').textContent=opts.join(' · ');
      div.querySelector('.del').addEventListener('click',()=>{
        if(confirm(o.name+'님의 주문을 삭제할까요?')){
          state.orders=state.orders.filter(x=>x.id!==o.id);
          save(); renderOrders();
        }
      });
      list.appendChild(div);
    });
  }
  const total=state.orders.reduce((s,o)=>s+o.price,0);
  const people=new Set(state.orders.map(o=>o.name)).size;
  $('countBadge').textContent=people+'명';
  $('barCups').textContent=state.orders.length+'잔 · '+people+'명';
  $('barTotal').textContent=won(total);
}

function addOrder(){
  const name=elName.value.trim();
  if(!name){ toast('이름을 입력해주세요'); elName.focus(); return; }

  let menuName, basePrice;
  if(elMenu.value===CUSTOM){
    menuName=elCustomName.value.trim();
    basePrice=parseInt(elCustomPrice.value.replace(/[^0-9]/g,''),10);
    if(!menuName){ toast('메뉴 이름을 입력해주세요'); elCustomName.focus(); return; }
    if(!basePrice||basePrice<=0){ toast('가격을 입력해주세요'); elCustomPrice.focus(); return; }
  } else {
    const m=BRANDS[state.brand].menus[+elMenu.value];
    menuName=m.name;
    basePrice=curTemp==='HOT'?m.hot:m.ice;
    if(basePrice==null){ toast('이 메뉴는 '+curTemp+' 옵션이 없습니다'); return; }
  }

  const shot=elShot.checked;
  const price=basePrice+(shot?BRANDS[state.brand].shotPrice:0);
  state.orders.push({
    id:Date.now()+'_'+Math.random().toString(36).slice(2,6),
    name, menu:menuName, temp:curTemp, shot,
    memo:elMemo.value.trim(), price,
  });
  save(); renderOrders();
  toast(name+'님 주문 완료 ☕');
  elName.value=''; elMemo.value=''; elShot.checked=false;
  elCustomName.value=''; elCustomPrice.value='';
  elName.focus();
}

function aggregate(){
  const map=new Map();
  state.orders.forEach(o=>{
    const key=[o.temp,o.menu,o.shot?'샷추가':'',o.memo].join('|');
    if(!map.has(key)) map.set(key,{...o,qty:0,sum:0,people:[]});
    const g=map.get(key); g.qty++; g.sum+=o.price; g.people.push(o.name);
  });
  return [...map.values()].sort((a,b)=>b.qty-a.qty);
}

function openReceipt(){
  if(!state.orders.length){ toast('주문이 아직 없습니다'); return; }
  const groups=aggregate();
  const total=state.orders.reduce((s,o)=>s+o.price,0);
  $('rcShop').textContent=BRANDS[state.brand].label+' 주문서';
  $('rcMeta').textContent=todayStr()+' · 총 '+state.orders.length+'잔';
  const body=$('rcBody'); body.innerHTML='';
  groups.forEach(g=>{
    const opts=[g.shot?'샷추가':null,g.memo||null].filter(Boolean).join(', ');
    const line=document.createElement('div'); line.className='receipt-line';
    line.innerHTML=
      '<span class="nm"><b>'+g.temp+'</b> <span class="gname"></span>'+
      (opts?' <span style="color:#7A7670;font-size:.8em">('+opts+')</span>':'')+
      '<span class="ppl"></span></span>'+
      '<span class="qt">× '+g.qty+'</span>'+
      '<span class="pr">'+won(g.sum)+'</span>';
    line.querySelector('.gname').textContent=g.menu;
    line.querySelector('.ppl').textContent=g.people.join(', ');
    body.appendChild(line);
  });
  $('rcTotal').textContent=won(total);
  $('modalBg').classList.add('show');
}

function copyReceipt(){
  const groups=aggregate();
  const total=state.orders.reduce((s,o)=>s+o.price,0);
  let txt='📋 '+BRANDS[state.brand].label+' 주문서 ('+todayStr()+')\n';
  txt+='──────────────\n';
  groups.forEach(g=>{
    const opts=[g.shot?'샷추가':null,g.memo||null].filter(Boolean).join(', ');
    txt+=g.temp+' '+g.menu+(opts?' ('+opts+')':'')+' × '+g.qty+'\n';
  });
  txt+='──────────────\n';
  txt+='총 '+state.orders.length+'잔 / '+won(total);
  navigator.clipboard.writeText(txt)
    .then(()=>toast('주문서가 복사되었습니다 📋'))
    .catch(()=>{
      const ta=document.createElement('textarea');
      ta.value=txt; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); ta.remove();
      toast('주문서가 복사되었습니다 📋');
    });
}

function todayStr(){
  const d=new Date();
  const day=['일','월','화','수','목','금','토'][d.getDay()];
  return (d.getMonth()+1)+'월 '+d.getDate()+'일 ('+day+')';
}
let toastTimer;
function toast(msg){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

/* 이벤트 */
document.querySelectorAll('.brand-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const b=btn.dataset.brand;
    if(b===state.brand) return;
    if(state.orders.length &&
       !confirm('브랜드를 '+BRANDS[b].label+'(으)로 바꾸면\n기존 주문 '+state.orders.length+'건이 모두 삭제됩니다.\n계속할까요?')) return;
    state.brand=b; state.orders=[]; curCat='전체';
    save(); applyBrandTheme(); renderCats(); renderMenuSelect(); renderOrders();
  });
});
document.querySelectorAll('#tempSeg button').forEach(b=>
  b.addEventListener('click',()=>setTemp(b.dataset.temp)));
elMenu.addEventListener('change', onMenuChange);
$('btnAdd').addEventListener('click', addOrder);
elName.addEventListener('keydown', e=>{ if(e.key==='Enter') addOrder(); });
$('btnReset').addEventListener('click',()=>{
  if(!state.orders.length) return;
  if(confirm('주문 '+state.orders.length+'건을 전부 삭제할까요?')){
    state.orders=[]; save(); renderOrders(); toast('초기화되었습니다');
  }
});
$('btnOpenReceipt').addEventListener('click', openReceipt);
$('btnCopy').addEventListener('click', copyReceipt);
$('btnClose').addEventListener('click',()=>$('modalBg').classList.remove('show'));
$('modalBg').addEventListener('click',e=>{ if(e.target===e.currentTarget) e.currentTarget.classList.remove('show'); });

/* 초기화 */
load();
$('todayDate').textContent=todayStr();
applyBrandTheme();
renderCats();
renderMenuSelect();
renderOrders();
</script>
</body>
</html>
